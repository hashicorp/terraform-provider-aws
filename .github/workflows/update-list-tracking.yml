name: Update List Tracking

on:
  push:
    branches:
      - main
    paths:
      - "internal/service/**/*.go"
  schedule:
    - cron: "0 0 * * *" # Run nightly at midnight UTC
  workflow_dispatch:

jobs:
  update-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x scripts/generate-list-tracking.sh

      - name: Update GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: "47005"
        run: |
          # 1. Fetch the current issue body
          gh issue view $ISSUE_NUMBER --json body -q .body > current_issue.md

          # 2. Extract everything up to and including the marker
          awk '/<!-- Below content is updated by script -->/{print; exit}' current_issue.md > new_issue.md

          # 3. Append the new dynamic content generated by our script
          ./.ci/scripts/generate-list-tracking.sh >> new_issue.md

          # 4. Update the issue
          gh issue edit $ISSUE_NUMBER --body-file new_issue.md
