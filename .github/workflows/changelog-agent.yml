name: Changelog automation

on:
  pull_request_target:
    types:
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  add-changelog:
    name: Add Changelog Entry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: .github/actions/community_check

      - name: Run Community Check
        id: community_check
        uses: ./.github/actions/community_check
        with:
          user_login: ${{ github.event.pull_request.user.login }}
          maintainers: ${{ secrets.MAINTAINERS }}

      - name: Trigger Copilot to add changelog
        if: steps.community_check.outputs.maintainer == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo "${{ github.repository }}" \
            --body "@copilot Add changelog for ${{ github.event.pull_request.html_url }}. Skip the push confirmation."
