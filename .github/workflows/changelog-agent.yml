name: Changelog automation

on:
  pull_request_target:
    types:
      - opened

permissions:
  contents: read
  pull-requests: write

jobs:
  add-changelog:
    name: Add Changelog Entry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/actions/community_check

      - name: Run Community Check
        id: community_check
        uses: ./.github/actions/community_check
        with:
          user_login: ${{ github.event.pull_request.user.login }}
          maintainers: ${{ secrets.MAINTAINERS }}

      - name: Trigger Copilot to add changelog
        if: steps.community_check.outputs.maintainer == 'true'
        env:
          GH_TOKEN: ${{ secrets.COPILOT_REQUESTS_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          PR_URL="https://github.com/${{ github.repository }}/pull/${PR_NUMBER}"
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "@copilot Add changelog for ${PR_URL}. Skip the push confirmation."