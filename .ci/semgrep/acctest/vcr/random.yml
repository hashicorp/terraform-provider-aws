    paths:
      include:
        - "**/*_test.go"
      exclude:
        - "/internal/provider/sdkv2"
        - "/internal/service/ec2"
        - "/internal/service/networkflowmonitor"
        - "/internal/service/odb"

  - id: use-acctest-charsetalphanum
    languages: [go]
    message: "Use acctest.CharSetAlphaNum instead of sdkacctest.CharSetAlphaNum"
    severity: WARNING
    pattern: |
      sdkacctest.CharSetAlphaNum
    fix: |
