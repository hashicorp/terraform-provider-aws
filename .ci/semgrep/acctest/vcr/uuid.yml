rules:
  - id: vcr-migrate-uuid
    languages:
      - go
    message: "Use create.UUID(ctx) instead of uuid.GenerateUUID() for VCR compatibility. This ensures deterministic UUID generation during test playback."
    severity: WARNING
    patterns:
      - pattern-inside: |
          func $FUNC(..., $CTX context.Context, ...) {
            ...
          }
      - pattern: uuid.GenerateUUID()
    paths:
      include:
        - "**/*.go"
